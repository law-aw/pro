# Rename "app" to match your Fly app name after you create it in the dashboard.
app = "notice-board-hub"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  ROLE = "hub"
  DATA_DIR = "/data"
  HOST = "0.0.0.0"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "notice_data"
  destination = "/data"
