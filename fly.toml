# fly.toml app configuration file generated for pro-tlax1w on 2026-07-22T15:50:07Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pro-tlax1w'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATA_DIR = '/data'
  HOST = '0.0.0.0'
  PORT = '3000'
  ROLE = 'hub'

[[mounts]]
  source = 'notice_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
